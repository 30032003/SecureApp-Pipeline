{% extends "base.html" %}

{% block title %}Register | SecureApp{% endblock %}

{% block content %}
<section class="auth-card">
    <h1>Create Account</h1>
    <p class="subtitle">Register for SecureApp-Pipeline</p>

    <form method="post" action="{{ url_for('register') }}" class="form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password" minlength="8">
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <p class="form-footer">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
</section>
{% endblock %}
